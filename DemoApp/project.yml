# XcodeGen 설정 — 실행: `brew install xcodegen && cd DemoApp && xcodegen`
name: HanTalkDemo
options:
  bundleIdPrefix: com.hantalk
  deploymentTarget:
    iOS: "17.0"
packages:
  HanChatKit:
    path: ../HanChatKit
targets:
  HanTalkDemo:
    type: application
    platform: iOS
    sources: [Sources]
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.hantalk.demo
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: 1
        CODE_SIGN_STYLE: Automatic
        # 실기기 테스트: 아래에 본인 Apple Developer 팀 ID를 넣으면
        # xcodegen 재생성 후에도 서명 설정이 유지됨 (Xcode에서 확인 가능)
        # DEVELOPMENT_TEAM: XXXXXXXXXX
    dependencies:
      - package: HanChatKit
        product: HanChatUI
      - package: HanChatKit
        product: HanChatData
      # Firebase로 전환할 때 주석 해제 + GoogleService-Info.plist 추가
      # - package: HanChatKit
      #   product: HanChatFirebase
