# XcodeGen 설정 — 실행: `brew install xcodegen && cd DemoApp && xcodegen`
name: HanTalkDemo
options:
  bundleIdPrefix: com.hantalk
  deploymentTarget:
    iOS: "17.0"
packages:
  HanChatKit:
    path: ../HanChatKit
targets:
  HanTalkDemo:
    type: application
    platform: iOS
    sources: [Sources]
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.hantalk.demo
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: 1
    dependencies:
      - package: HanChatKit
        product: HanChatUI
      - package: HanChatKit
        product: HanChatData
      # Firebase로 전환할 때 주석 해제 + GoogleService-Info.plist 추가
      # - package: HanChatKit
      #   product: HanChatFirebase
