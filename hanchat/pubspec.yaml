# hanchat — 어떤 Flutter 앱에도 붙는 채팅 SDK (pub.dev 배포 대상)
# 24시간 뒤 사라지는 메시지 · 그리는 과정이 재생되는 그림/이모티콘 · 인라인 번역
name: hanchat
description: >-
  Ephemeral chat SDK with replayable vector drawings and an emoticon gallery.
  Clean Architecture + MVVM. Server is a mailbox, not a database.
version: 0.1.0
repository: https://github.com/clapbin78/HanTalk

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  # 전화번호 해시 (SHA-256) — 원본 번호는 서버로 가지 않는다
  crypto: ^3.0.3
  # 로컬 저장 (SwiftData 대체) — Phase: data 레이어에서 사용
  sqflite: ^2.3.0
  path: ^1.9.0
  # 설정값 (그리기 재생 토글 등)
  shared_preferences: ^2.2.0
  # 온보딩: 약관 웹뷰, 알림 권한, 연락처 친구찾기
  url_launcher: ^6.3.0
  permission_handler: ^11.3.0
  # 1.x는 최신 Flutter(Scene 기반)에서 앱 시작 크래시 → 2.x 필수
  flutter_contacts: ^2.2.2
  # 인라인 번역 (온디바이스, 무료 — 커스텀 TranslationService 주입 시 미사용)
  google_mlkit_translation: ^0.11.0
  google_mlkit_language_id: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # 호스트 머신에서 sqflite 통합 테스트 (FFI sqlite)
  sqflite_common_ffi: ^2.3.0

flutter: {}
